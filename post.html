<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — watery</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .post-content h1 { font-family: var(--font-heading); font-size: 21px; font-weight: 400; margin-bottom: 6px; }
    .post-content .meta { color: var(--text-light); font-size: 12px; margin-bottom: 28px; }
    .post-content p { margin-bottom: 18px; line-height: 2; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
    .post-content img { max-width: 100%; border-radius: var(--radius-sm); margin: 20px 0; }
    .post-content blockquote { border-left: 3px solid var(--pink); padding-left: 16px; color: var(--text-light); margin: 20px 0; font-style: italic; }
    .post-content ul, .post-content ol { margin-bottom: 18px; padding-left: 24px; }
    .post-content li { margin-bottom: 6px; }
    .post-content code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .post-content pre { background: var(--bg); padding: 16px; border-radius: var(--radius-sm); overflow-x: auto; margin-bottom: 18px; }
    .post-content pre code { background: none; padding: 0; }
    .post-content h2 { font-family: var(--font-heading); font-size: 18px; font-weight: 400; margin-top: 32px; margin-bottom: 12px; }
    .post-content h3 { font-family: var(--font-heading); font-size: 16px; font-weight: 400; margin-top: 24px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-inner">
        <div class="site-title"><a href="index.html">watery</a></div>
        <div class="nav-links">
          <a href="index.html">首页</a>
          <a href="photos.html">相册</a>
          <a href="journal.html">文章</a>
          <a href="about.html">关于</a>
          <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
      </div>
    </header>

    <main>
      <div class="card" id="postContent">
        <div class="empty-state">加载中...</div>
      </div>

      <div style="text-align:center;margin-top:8px;">
        <a href="journal.html" style="font-size:13px;color:var(--text-light);">&larr; 回到日常</a>
      </div>
    </main>

    <footer>
      &copy; 2026 watery
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
